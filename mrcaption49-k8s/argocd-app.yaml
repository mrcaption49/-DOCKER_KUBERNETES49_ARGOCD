apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mrcaption49
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mrcaption49/-DOCKER_KUBERNETES49_ARGOCD.git
    targetRevision: master
    path: mrcaption49-k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true